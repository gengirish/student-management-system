services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-student_mgmt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sms} -d ${POSTGRES_DB:-student_mgmt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-sms}:${POSTGRES_PASSWORD:-sms_secret}@postgres:5432/${POSTGRES_DB:-student_mgmt}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production-min-32-chars-long}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      UPLOAD_DIR: /app/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
